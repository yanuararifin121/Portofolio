<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="icon" type="image/png" href="../Foto/logo fiuks.png">

<style>
    /* Glass Effect */
    .glass {
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.08);
        box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    /* Gradient Accent */
    .bg-gradient-ui {
        background: linear-gradient(135deg, #8b5cf6, #6366f1);
    }
</style>
</head>

<body class="relative bg-[#0a0a0c] flex items-center justify-center min-h-screen overflow-hidden">

<!-- Background Glow -->
<div class="absolute -top-40 -left-40 w-[500px] h-[500px] bg-purple-600/20 rounded-full blur-[120px]"></div>
<div class="absolute bottom-0 right-0 w-[400px] h-[400px] bg-indigo-600/20 rounded-full blur-[120px]"></div>

<!-- Login Card -->
<div class="relative glass p-10 rounded-3xl w-full max-w-sm z-10">

    <!-- Header -->
    <div class="text-center mb-8">
        <div class="w-14 h-14 mx-auto mb-4 rounded-full bg-gradient-ui flex items-center justify-center shadow-lg">
            <img
                src="../Foto/logo fiuks.png"
                alt="Admin"
                class="w-11 h-11 rounded-full object-cover"
            />
        </div>

        <h2 class="text-2xl font-bold text-white">Admin Login</h2>
        <p class="text-sm text-gray-400 mt-1">Masuk ke panel portfolio</p>
    </div>

    <!-- Form -->
    <div class="space-y-4">
        <input
            id="username"
            type="text"
            placeholder="Username"
            class="w-full px-4 py-3 rounded-xl bg-white/5 text-white placeholder-gray-500
                   border border-white/10 focus:border-purple-500/50 focus:ring-2
                   focus:ring-purple-500/20 outline-none transition"
        >

        <input
            id="password"
            type="password"
            placeholder="Password"
            class="w-full px-4 py-3 rounded-xl bg-white/5 text-white placeholder-gray-500
                   border border-white/10 focus:border-purple-500/50 focus:ring-2
                   focus:ring-purple-500/20 outline-none transition"
        >

        <button
            onclick="login()"
            class="w-full mt-4 py-3 rounded-xl font-bold text-white
                   bg-gradient-ui hover:opacity-90 hover:scale-[1.01]
                   transition-all duration-200 shadow-lg"
        >
            Login
        </button>
    </div>

    <!-- Footer -->
    <p class="text-xs text-gray-500 text-center mt-6">
        © 2026 Yann UI/UX
    </p>
</div>

<!-- Custom JS -->
<script type="module" src="../admin/login.js"></script>
</body>
</html>
